name: "Agent Parity Check"

on:
  workflow_dispatch:
    inputs:
      codex_run_id:
        description: Successful `Run Demo (Codex)` run ID
        type: string
        required: true
      claude_run_id:
        description: Successful `Run Demo (Claude)` run ID
        type: string
        required: true
      copilot_verify_run_id:
        description: Successful `Verify Copilot PR` run ID for a single-PR Copilot proof
        type: string
        required: false
        default: ""
      copilot_verify_run_ids:
        description: Optional comma/newline/space separated `Verify Copilot PR` run IDs for a multi-PR Copilot campaign
        type: string
        required: false
        default: ""
      expected_repository:
        description: Expected repository owner/name
        type: string
        default: "sthenos-security/reach-testbed-github-go"
      expected_copilot_task_id:
        description: Optional expected Copilot task ID
        type: string
        default: ""
      expected_copilot_pr:
        description: Optional expected Copilot PR number
        type: string
        default: ""

permissions:
  actions: read
  contents: read

jobs:
  compare-proof-artifacts:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Codex artifacts
        run: |
          set -euo pipefail
          mkdir -p parity/codex
          gh run download "${{ inputs.codex_run_id }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name reachable-ci-artifacts \
            --dir parity/codex

      - name: Download Claude artifacts
        run: |
          set -euo pipefail
          mkdir -p parity/claude
          gh run download "${{ inputs.claude_run_id }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name reachable-ci-artifacts \
            --dir parity/claude

      - name: Download Copilot verification artifacts
        run: |
          set -euo pipefail
          mkdir -p parity/copilot
          python3 - <<'PY'
          import os
          import re
          import subprocess
          import sys
          from pathlib import Path

          raw = (os.environ.get("COPILOT_VERIFY_RUN_IDS") or "").strip()
          fallback = (os.environ.get("COPILOT_VERIFY_RUN_ID") or "").strip()
          if not raw:
              raw = fallback
          run_ids = [token for token in re.split(r"[\s,]+", raw) if token]
          if not run_ids:
              raise SystemExit("At least one Copilot verify run ID is required.")
          for run_id in run_ids:
              target = Path("parity/copilot") / f"run-{run_id}"
              target.mkdir(parents=True, exist_ok=True)
              subprocess.run(
                  [
                      "gh",
                      "run",
                      "download",
                      run_id,
                      "--repo",
                      os.environ["GITHUB_REPOSITORY"],
                      "--name",
                      "reachable-copilot-pr-verification",
                      "--dir",
                      str(target),
                  ],
                  check=True,
              )
          print(f"Downloaded {len(run_ids)} Copilot verification artifact(s).")
          PY
        env:
          COPILOT_VERIFY_RUN_ID: ${{ inputs.copilot_verify_run_id }}
          COPILOT_VERIFY_RUN_IDS: ${{ inputs.copilot_verify_run_ids }}

      - name: Compare parity outcomes
        run: |
          set -euo pipefail
          expected_pr_args=()
          if [ -n "${{ inputs.expected_copilot_pr }}" ]; then
            expected_pr_args+=(--expected-copilot-pr "${{ inputs.expected_copilot_pr }}")
          fi
          expected_task_args=()
          if [ -n "${{ inputs.expected_copilot_task_id }}" ]; then
            expected_task_args+=(--expected-copilot-task-id "${{ inputs.expected_copilot_task_id }}")
          fi
          python3 ci/check-agent-parity.py \
            --codex-artifact-dir parity/codex \
            --claude-artifact-dir parity/claude \
            --copilot-artifact-dir parity/copilot \
            --expected-repository "${{ inputs.expected_repository }}" \
            "${expected_task_args[@]}" \
            "${expected_pr_args[@]}" \
            --output parity/agent-parity-report.json

      - name: Write parity audit log
        if: always()
        run: |
          set -euo pipefail
          if [ ! -f parity/agent-parity-report.json ]; then
            echo "No parity report was produced; skipping audit log." >&2
            exit 0
          fi
          python3 ci/write-agent-audit-log.py \
            --parity-report parity/agent-parity-report.json \
            --output-dir parity

      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: reachable-agent-parity-report
          path: |
            parity/agent-parity-report.json
            parity/agent-remediation-audit-log.json
            parity/agent-remediation-audit-log.md
          if-no-files-found: error
          retention-days: 14
