# Generated by reachable.ci.autoremediation.
# Keep this wrapper small; the remediation implementation lives in the
# versioned Reachable reusable workflow referenced below.
name: "Run Demo (Codex)"

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Base branch or existing remediation branch
        type: string
        default: "main"
      remediate:
        description: Allow Reachable to create code changes
        type: boolean
        default: true
      rescan_only:
        description: Only verify target_branch; do not edit code
        type: boolean
        default: false
      scan_mode:
        description: Use real for full Reachable execution, or nop for CI integration smoke tests without scanner or agent execution
        type: string
        default: "real"
      create_pr:
        description: Open a remediation pull request after proof passes
        type: boolean
        default: true

permissions:
  actions: write
  contents: write
  id-token: write
  pages: write
  pull-requests: write
  security-events: write

jobs:
  reachable-auto-remediation:
    uses: sthenos-security/reach-ci-github/.github/workflows/auto-remediate.yml@v1
    with:
      target_branch: ${{ inputs.target_branch }}
      remediate: ${{ inputs.remediate }}
      rescan_only: ${{ inputs.rescan_only }}
      scan_mode: ${{ inputs.scan_mode }}
      create_pr: ${{ inputs.create_pr }}
      ai_mode: "openai-codex"
      prompt_profile: "balanced"
      signal_types: "all"
      max_batches: 1
      rescan_strategy: "each_batch"
      publish_report: true
      require_ai: true
      fresh_scan: true
      reachable_dist_repo: "sthenos-security/reach-dist"
    secrets: inherit
